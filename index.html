<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>みんなのお誕生日</title>

<style>
:root{
  --main-pink:#ffb7c5;
  --sub-pink:#ff8fb1;
  --highlight-bg:#fff5f7;
  --highlight-border:#ffcada;
  --bg-color:#fffaf0;
  --text-color:#7d5a50;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}

body{
  margin:0;
  font-family:sans-serif;
  background:var(--bg-color);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

h1{
  color:var(--sub-pink);
  margin-bottom:20px;
}

.table-container{
  background:white;
  padding:16px;
  border-radius:20px;
  border:6px solid #ffecb3;
}

table{
  border-collapse:separate;
  border-spacing:4px;
}

th{
  width:34px;height:34px;
  font-size:12px;
  border-radius:8px;
  cursor:pointer;
}

.cell{
  width:34px;height:34px;
  border-radius:8px;
  text-align:center;
  cursor:pointer;
  background:white;
  border:2px solid #eee;
}

.cell.none{
  background:#f5f5f5;
  pointer-events:none;
}

.color-1{background:#e1f5fe;}
.color-2{background:#f1f8e9;}
.color-3{background:#fff9c4;}
.color-4{background:#ffe0b2;}
.color-5{background:#f8bbd0;}
</style>
</head>

<body>

<h1>みんなのお誕生日</h1>

<div class="table-container">
<table id="calendar-table"></table>
</div>

<script>
var monthDays=[31,29,31,30,31,30,31,31,30,31,30,31];
var counts=[];
var undoStack=[];
var redoStack=[];

function buildEmpty(){
  counts=[];
  for(var m=0;m<12;m++){
    var row=[];
    for(var d=0;d<31;d++){
      row.push(d<monthDays[m]?0:-1);
    }
    counts.push(row);
  }
}

function init(){
  buildEmpty();
  render();
}

function render(){
  var table=document.getElementById("calendar-table");
  var html="<tr><th></th>";

  for(var d=0;d<31;d++){
    html+="<th data-col='"+d+"'>"+(d+1)+"</th>";
  }
  html+="</tr>";

  for(var m=0;m<12;m++){
    html+="<tr>";
    html+="<th data-row='"+m+"'>"+(m+1)+"月</th>";
    for(var d=0;d<31;d++){
      var val=counts[m][d];
      if(val===-1){
        html+="<td class='cell none'></td>";
      }else{
        var cls="cell";
        if(val>0) cls+=" color-"+(val>5?5:val);
        html+="<td class='"+cls+"' data-m='"+m+"' data-d='"+d+"'>"+(val>0?val:"")+"</td>";
      }
    }
    html+="</tr>";
  }

  table.innerHTML=html;

  // --- セルクリックイベント登録（iOS安定版） ---
  var cells=table.querySelectorAll(".cell:not(.none)");
  cells.forEach(function(cell){
    cell.addEventListener("click",function(){
      var m=parseInt(this.dataset.m);
      var d=parseInt(this.dataset.d);
      cellClick(m,d);
    });
  });

  // --- iOS強制リペイント ---
  void table.offsetHeight;
}

function cellClick(m,d){
  undoStack.push(JSON.stringify(counts));
  counts[m][d]++;
  render();
}

window.onload=init;
</script>

</body>
</html>
