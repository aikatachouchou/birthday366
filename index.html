<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>みんなのお誕生日</title>
<link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@500&amp;display=swap" rel="stylesheet">
<style>
  :root {
    --main-pink: #ffb7c5; /* さくら色 */
    --sub-pink: #ff8fb1;
    --highlight-bg: #fff5f7;
    --highlight-border: #ffcada;
    --bg-color: #fffaf0; /* ミルク色 */
    --text-color: #7d5a50; /* チョコ色 */
    --mint-green: #b2e2d2;
    --soft-yellow: #fff9c4;
  }

  body {
    font-family: 'Kiwi Maru', serif;
    background-color: var(--bg-color);
    background-image: radial-gradient(#ffe4e1 1px, transparent 1px);
    background-size: 20px 20px; /* 背景に薄いドット模様 */
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 10px;
    color: var(--text-color);
    position: relative; 
    min-height: 100vh;
  }

  /* 操作パネル */
  .controls {
    position: absolute;
    top: 15px;
    right: 15px;
    display: flex;
    gap: 12px;
  }

  .ctrl-btn {
    padding: 8px 16px;
    font-size: 14px;
    font-weight: bold;
    border: 2px solid #ffecb3;
    border-radius: 15px;
    cursor: pointer;
    background-color: white;
    box-shadow: 0 4px 0 #ffecb3;
    font-family: inherit;
    color: var(--text-color);
    transition: all 0.1s;
  }
  .ctrl-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #ffecb3; }
  .ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .ctrl-btn.reset-btn { background-color: #ff8a80; color: white; border-color: #ff5252; box-shadow: 0 4px 0 #ff5252; }

  h1 { 
    color: var(--sub-pink); 
    font-size: 3rem;
    margin-bottom: 20px;
    text-shadow: 3px 3px 0px white, -1px -1px 0px white;
    letter-spacing: 2px;
  }

  /* テーブル装飾 */
  .table-container {
    background: white;
    padding: 20px;
    border-radius: 35px;
    border: 8px solid #ffecb3;
    margin-bottom: 30px;
    box-shadow: 0 15px 30px rgba(255, 183, 197, 0.2);
  }

  table { border-collapse: separate; border-spacing: 4px; }

  th {
    width: 38px; height: 38px; font-size: 14px; cursor: pointer;
    background-color: #fffdf9; border-radius: 12px; transition: all 0.2s; border: 2px solid #fff5f7;
  }
  th.active-header { background-color: var(--main-pink) !important; color: white !important; border-color: var(--sub-pink); }

  .cell {
    width: 40px; height: 40px; border-radius: 12px; border: 2px solid #fff5f7;
    text-align: center; cursor: pointer; font-size: 18px; font-weight: bold; transition: all 0.1s; background: white;
  }
  .cell:hover { transform: scale(1.15) rotate(2deg); z-index: 10; border-color: var(--main-pink); }
  
  .highlight-row { background-color: var(--highlight-bg) !important; }
  .highlight-col { background-color: var(--highlight-bg) !important; }
  .cell.cross-point { box-shadow: 0 0 0 3px var(--highlight-border); border-color: var(--sub-pink); }

  .cell.none { background-color: #f5f5f5; border: none; pointer-events: none; opacity: 0.5; }
  
  /* スイーツカラーのカウント色 */
  .color-1 { background-color: #e1f5fe !important; } /* ラムネ */
  .color-2 { background-color: #f1f8e9 !important; } /* メロンシュガー */
  .color-3 { background-color: #fff9c4 !important; } /* プレーンプリン */
  .color-4 { background-color: #ffe0b2 !important; } /* オレンジゼリー */
  .color-5 { background-color: #f8bbd0 !important; border-color: var(--sub-pink) !important; } /* いちごみるく */

  .btn-area { display: flex; gap: 30px; justify-content: center; width: 100%; }
  .main-btn {
    padding: 20px 40px; font-size: 1.3rem; font-weight: bold; cursor: pointer;
    color: white; border: none; border-radius: 60px; font-family: inherit; transition: all 0.2s;
  }
  .btn-no-dup { background-color: var(--sub-pink); box-shadow: 0 8px 0 #e57399; }
  .btn-allow-dup { background-color: var(--mint-green); color: #5d4037; box-shadow: 0 8px 0 #8cc7b1; }
  .main-btn:active { transform: translateY(6px); box-shadow: 0 2px 0 rgba(0,0,0,0.1); }

  #toast-notice {
    position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(to right, var(--sub-pink), #ffb7c5);
    color: white; padding: 15px 35px; border-radius: 30px; font-size: 1.2rem;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1); display: none; z-index: 5000;
    animation: bounceIn 1.5s ease forwards;
  }

  @keyframes bounceIn {
    0% { opacity: 0; transform: translate(-50%, 20px); }
    20% { opacity: 1; transform: translate(-50%, 0); }
    80% { opacity: 1; transform: translate(-50%, 0); }
    100% { opacity: 0; transform: translate(-50%, -20px); }
  }

  .overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(125, 90, 80, 0.3); display: none; align-items: center; justify-content: center; z-index: 6000; backdrop-filter: blur(6px);
  }
  .modal { 
    background: white; padding: 50px; border-radius: 40px; text-align: center; border: 8px solid #ffecb3;
    max-width: 420px; box-shadow: 0 20px 0 #ffecb3;
  }
  .modal-btns { display: flex; gap: 20px; justify-content: center; margin-top: 30px; }

  /* クレジット表示用（リンク設定） */
  .credit {
    position: fixed;
    right: 15px;
    bottom: 10px;
    font-size: 14px;
    opacity: 0.8;
    z-index: 1000;
  }
  .credit a {
    color: var(--sub-pink);
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .credit a:hover {
    text-decoration: underline;
    opacity: 1;
  }
</style>
</head>
<body>

  <div class="controls">
    <button id="undo-btn" class="ctrl-btn">← もどす</button>
    <button id="redo-btn" class="ctrl-btn">すすむ →</button>
    <button id="reset-trigger" class="ctrl-btn reset-btn">ぜんぶ消す！</button>
  </div>

  <h1>みんなのお誕生日</h1>
  
  <div class="table-container">
    <table id="calendar-table"></table>
  </div>

  <div class="btn-area">
    <button id="btn-no-dup" class="main-btn btn-no-dup">被らないランダム</button>
    <button id="btn-allow-dup" class="main-btn btn-allow-dup">被れるランダム</button>
  </div>

  <div class="credit">
    <a href="https://x.com/momochou_md?s=20" target="_blank">for @momochou_md</a>
  </div>

  <div id="toast-notice"></div>

  <div id="modal-overlay" class="overlay">
    <div class="modal">
      <p id="modal-text" style="font-size: 1.4rem; font-weight: bold; line-height: 1.6;"></p>
      <div id="modal-btns" class="modal-btns"></div>
    </div>
  </div>

<script>
  var monthDays = [31, 29, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
  var counts = [];
  var undoStack = [];
  var redoStack = [];
  var activeMonth = null;
  var activeDay = null;

  function init() {
    var saved = localStorage.getItem('bday_v_sweet_final');
    if (saved) {
      counts = JSON.parse(saved);
    } else {
      for (var m = 0; m < 12; m++) {
        var row = [];
        for (var d = 0; d < 31; d++) { row.push(d < monthDays[m] ? 0 : -1); }
        counts.push(row);
      }
    }
    render();
  }

  function render() {
    var table = document.getElementById('calendar-table');
    var html = '<tr><th></th>';
    for (var d = 0; d < 31; d++) {
      var activeCls = (activeDay === d) ? 'active-header' : '';
      html += '<th class="' + activeCls + '" onclick="toggleCol(' + d + ')">' + (d + 1) + '</th>';
    }
    html += '</tr>';

    for (var m = 0; m < 12; m++) {
      var rowActiveCls = (activeMonth === m) ? 'active-header' : '';
      html += '<tr><th class="' + rowActiveCls + '" onclick="toggleRow(' + m + ')">' + (m + 1) + '月</th>';
      for (var d = 0; d < 31; d++) {
        var val = counts[m][d];
        if (val === -1) {
          html += '<td class="cell none"></td>';
        } else {
          var cls = 'cell';
          if (val > 0) cls += ' color-' + (val > 5 ? 5 : val);
          if (activeMonth === m) cls += ' highlight-row';
          if (activeDay === d) cls += ' highlight-col';
          if (activeMonth === m && activeDay === d) cls += ' cross-point';
          html += '<td class="' + cls + '" onclick="cellClick(' + m + ',' + d + ')">' + (val > 0 ? val : '') + '</td>';
        }
      }
      html += '</tr>';
    }
    table.innerHTML = html;
    document.getElementById('undo-btn').disabled = (undoStack.length === 0);
    document.getElementById('redo-btn').disabled = (redoStack.length === 0);
    localStorage.setItem('bday_v_sweet_final', JSON.stringify(counts));
  }

  function showToast(m, d) {
    var toast = document.getElementById('toast-notice');
    toast.innerText = (m + 1) + "月" + (d + 1) + "日がえらばれたよ！";
    toast.style.display = 'none';
    void toast.offsetWidth;
    toast.style.display = 'block';
  }

  window.toggleRow = function(m) { activeMonth = (activeMonth === m) ? null : m; render(); };
  window.toggleCol = function(d) { activeDay = (activeDay === d) ? null : d; render(); };

  window.cellClick = function(m, d, fromRandom) {
    undoStack.push({ type: 'normal', data: JSON.stringify(counts) });
    redoStack = [];
    counts[m][d]++;
    if (fromRandom) showToast(m, d);
    render();
  };

  window.undo = function() {
    if (undoStack.length === 0) return;
    var last = undoStack.pop();
    if (last.type !== 'reset') {
      redoStack.push({ type: 'normal', data: JSON.stringify(counts) });
    } else {
      redoStack = [];
    }
    counts = JSON.parse(last.data);
    render();
  };

  window.redo = function() {
    if (redoStack.length === 0) return;
    var next = redoStack.pop();
    undoStack.push({ type: 'normal', data: JSON.stringify(counts) });
    counts = JSON.parse(next.data);
    render();
  };

  document.getElementById('btn-no-dup').onclick = function() {
    var targets = [];
    for(var m=0; m<12; m++) for(var d=0; d<31; d++) if(counts[m][d] === 0) targets.push({m:m, d:d});
    if (targets.length === 0) {
      showModal("ぜんぶのマスが埋まったよ！<br>おめでとう〜！", [{label: "やったー！", action: closeModal, css: 'ctrl-btn'}]);
      return;
    }
    var t = targets[Math.floor(Math.random() * targets.length)];
    cellClick(t.m, t.d, true);
  };

  document.getElementById('btn-allow-dup').onclick = function() {
    var allValid = [];
    for(var m=0; m<12; m++) for(var d=0; d<31; d++) if(counts[m][d] !== -1) allValid.push({m:m, d:d});
    var t = allValid[Math.floor(Math.random() * allValid.length)];
    cellClick(t.m, t.d, true);
  };

  document.getElementById('reset-trigger').onclick = function() {
    showModal("データをぜんぶ消しちゃう？<br>最初からやりなおす？", [
      {label: "やめる", action: closeModal, css: 'ctrl-btn'},
      {label: "消しちゃう！", action: executeReset, css: 'reset-btn'}
    ]);
  };

  function executeReset() {
    undoStack.push({ type: 'reset', data: JSON.stringify(counts) });
    redoStack = [];
    for(var m=0; m<12; m++) for(var d=0; d<31; d++) if(counts[m][d] > 0) counts[m][d] = 0;
    render();
    closeModal();
  }

  function showModal(text, buttons) {
    document.getElementById('modal-text').innerHTML = text;
    var btnArea = document.getElementById('modal-btns');
    btnArea.innerHTML = '';
    buttons.forEach(function(b) {
      var btn = document.createElement('button');
      btn.innerText = b.label;
      btn.className = 'ctrl-btn ' + (b.css || '');
      btn.onclick = b.action;
      btnArea.appendChild(btn);
    });
    document.getElementById('modal-overlay').style.display = 'flex';
  }

  function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

  document.getElementById('undo-btn').onclick = undo;
  document.getElementById('redo-btn').onclick = redo;
  window.onload = init;
</script>
</body>
</html>
