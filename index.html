<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>みんなのお誕生日</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="お誕生日">
<meta name="theme-color" content="#ffb7c5">
<link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --main-pink: #ffb7c5;
    --sub-pink: #ff8fb1;
    --highlight-bg: #fff5f7;
    --highlight-border: #ffcada;
    --bg-color: #fffaf0;
    --text-color: #7d5a50;
    --mint-green: #b2e2d2;
    --safe-top:    env(safe-area-inset-top,    0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left:   env(safe-area-inset-left,   0px);
    --safe-right:  env(safe-area-inset-right,  0px);
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  html, body {
    height: 100%;
    overscroll-behavior: none;
  }

  body {
    font-family: 'Kiwi Maru', serif;
    background-color: var(--bg-color);
    background-image: radial-gradient(#ffe4e1 1px, transparent 1px);
    background-size: 20px 20px;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding:
      calc(var(--safe-top) + 16px)
      calc(var(--safe-right) + 12px)
      calc(var(--safe-bottom) + 30px)
      calc(var(--safe-left) + 12px);
    color: var(--text-color);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    gap: 14px;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━
     【修正2】ヘッダー構造
     タイトルと操作ボタンを同一コンテナに入れ
     絶対配置による重なりを解消
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .header {
    width: 100%;
    max-width: 900px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 8px;
  }

  /* タイトルはグリッド中央列 */
  h1 {
    grid-column: 2;
    color: var(--sub-pink);
    font-size: clamp(1.6rem, 4vw, 3rem);
    margin: 0;
    text-shadow: 3px 3px 0 white, -1px -1px 0 white;
    letter-spacing: 2px;
    text-align: center;
    white-space: nowrap;
  }

  /* 操作ボタンはグリッド右列 */
  .controls {
    grid-column: 3;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }

  /* スマホはヘッダーを縦積みに変更 */
  @media (max-width: 600px) {
    .header {
      grid-template-columns: 1fr;
    }
    h1 {
      grid-column: 1;
      font-size: clamp(1.5rem, 6vw, 2.4rem);
    }
    .controls {
      grid-column: 1;
      justify-content: center;
    }
  }

  .ctrl-btn {
    padding: 10px 16px;
    font-size: 13px;
    font-weight: bold;
    border: 2px solid #ffecb3;
    border-radius: 15px;
    cursor: pointer;
    background-color: white;
    box-shadow: 0 4px 0 #ffecb3;
    font-family: inherit;
    color: var(--text-color);
    transition: all 0.1s;
    touch-action: manipulation;
    min-height: 44px;
    white-space: nowrap;
  }
  .ctrl-btn:active  { transform: translateY(3px); box-shadow: 0 1px 0 #ffecb3; }
  .ctrl-btn:hover   { opacity: 0.85; }
  .ctrl-btn:disabled { opacity: 0.3; pointer-events: none; }
  .ctrl-btn.reset-btn {
    background-color: #ff8a80;
    color: white;
    border-color: #ff5252;
    box-shadow: 0 4px 0 #ff5252;
  }

  /* ━━━ テーブル ━━━ */
  .table-wrapper {
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .table-wrapper::-webkit-scrollbar { height: 4px; }
  .table-wrapper::-webkit-scrollbar-thumb { background: #ffcada; border-radius: 4px; }

  .table-container {
    background: white;
    padding: 16px;
    border-radius: 35px;
    border: 8px solid #ffecb3;
    box-shadow: 0 15px 30px rgba(255, 183, 197, 0.2);
    display: inline-block;
    min-width: max-content;
    /* 【修正1】GPU合成レイヤーに乗せることでiOS Safariの
       innerHTML再描画後のリペイント遅延を防ぐ */
    -webkit-transform: translateZ(0);
    transform: translateZ(0);
    will-change: contents;
  }

  table { border-collapse: separate; border-spacing: 4px; }

  th {
    width: 38px; height: 38px;
    font-size: 13px; font-weight: bold;
    cursor: pointer;
    background-color: #fffdf9;
    border-radius: 12px;
    transition: background-color 0.15s;
    border: 2px solid #fff5f7;
    font-family: inherit;
    color: var(--text-color);
    touch-action: manipulation;
  }
  th:hover  { background-color: var(--highlight-bg); }
  th:active { transform: scale(0.9); }
  th.active-header {
    background-color: var(--main-pink) !important;
    color: white !important;
    border-color: var(--sub-pink);
  }

  .cell {
    width: 38px; height: 38px;
    border-radius: 12px;
    border: 2px solid #fff5f7;
    text-align: center;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    font-family: inherit;
    /* transitionをtransformのみに限定（backgroundはすぐ反映） */
    transition: transform 0.12s;
    background: white;
    touch-action: manipulation;
    color: var(--text-color);
  }
  .cell:hover  { transform: scale(1.15) rotate(2deg); border-color: var(--main-pink); }
  .cell:active { transform: scale(0.85) rotate(2deg); }

  .highlight-row { background-color: var(--highlight-bg) !important; }
  .highlight-col { background-color: var(--highlight-bg) !important; }
  .cell.cross-point { box-shadow: 0 0 0 3px var(--highlight-border); border-color: var(--sub-pink); }
  .cell.none { background-color: #f5f5f5; border: none; pointer-events: none; opacity: 0.5; }

  .color-1 { background-color: #e1f5fe !important; }
  .color-2 { background-color: #f1f8e9 !important; }
  .color-3 { background-color: #fff9c4 !important; }
  .color-4 { background-color: #ffe0b2 !important; }
  .color-5 { background-color: #f8bbd0 !important; border-color: var(--sub-pink) !important; }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━
     【修正3】ランダムボタン
     white-space: nowrap で強制改行を防止
     flex-shrink: 0 で縮小させない
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .btn-area {
    display: flex;
    gap: 16px;
    justify-content: center;
    width: 100%;
    flex-wrap: wrap;
    padding: 0 4px;
  }

  .main-btn {
    flex: 0 0 auto;           /* 縮小・拡大しない */
    padding: 18px 32px;
    font-size: clamp(1rem, 2.5vw, 1.3rem);
    font-weight: bold;
    cursor: pointer;
    color: white;
    border: none;
    border-radius: 60px;
    font-family: inherit;
    transition: all 0.2s;
    touch-action: manipulation;
    min-height: 56px;
    white-space: nowrap;      /* テキストを折り返さない */
  }
  .btn-no-dup    { background-color: var(--sub-pink); box-shadow: 0 8px 0 #e57399; }
  .btn-allow-dup { background-color: var(--mint-green); color: #5d4037; box-shadow: 0 8px 0 #8cc7b1; }
  .main-btn:hover  { opacity: 0.9; }
  .main-btn:active { transform: translateY(6px); box-shadow: 0 2px 0 rgba(0,0,0,0.1); }

  /* ━━━ トースト ━━━ */
  #toast-notice {
    position: fixed;
    bottom: calc(var(--safe-bottom) + 50px);
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(to right, var(--sub-pink), #ffb7c5);
    color: white;
    padding: 15px 35px;
    border-radius: 30px;
    font-size: 1.1rem;
    font-family: inherit;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    display: none;
    z-index: 5000;
    white-space: nowrap;
    animation: bounceIn 1.5s ease forwards;
  }
  @keyframes bounceIn {
    0%   { opacity: 0; transform: translate(-50%, 20px); }
    20%  { opacity: 1; transform: translate(-50%, 0); }
    80%  { opacity: 1; transform: translate(-50%, 0); }
    100% { opacity: 0; transform: translate(-50%, -20px); }
  }

  /* ━━━ モーダル ━━━ */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(125, 90, 80, 0.3);
    display: none; align-items: center; justify-content: center;
    z-index: 6000;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    padding: 20px;
  }
  .modal {
    background: white;
    padding: 40px 36px;
    border-radius: 40px;
    text-align: center;
    border: 8px solid #ffecb3;
    max-width: 420px; width: 100%;
    box-shadow: 0 20px 0 #ffecb3, 0 30px 40px rgba(0,0,0,0.1);
    animation: modalPop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes modalPop {
    0%   { transform: scale(0.7); opacity: 0; }
    100% { transform: scale(1);   opacity: 1; }
  }
  #modal-text {
    font-size: 1.3rem;
    font-weight: bold;
    line-height: 1.7;
    font-family: inherit;
    color: var(--text-color);
  }
  .modal-btns { display: flex; gap: 16px; justify-content: center; margin-top: 28px; }

  /* ━━━ クレジット ━━━ */
  .credit {
    position: fixed;
    right: calc(var(--safe-right) + 15px);
    bottom: calc(var(--safe-bottom) + 10px);
    font-size: 13px;
    opacity: 0.8;
    z-index: 1000;
    font-family: inherit;
  }
  .credit a { color: var(--sub-pink); text-decoration: none; }
  .credit a:hover { text-decoration: underline; }
</style>
</head>
<body>

  <div class="header">
    <div><!-- 左の空きスペース（グリッドバランス用） --></div>
    <h1>みんなのお誕生日</h1>
    <div class="controls">
      <button id="undo-btn" class="ctrl-btn">← もどす</button>
      <button id="redo-btn" class="ctrl-btn">すすむ →</button>
      <button id="reset-trigger" class="ctrl-btn reset-btn">ぜんぶ消す！</button>
    </div>
  </div>

  <div class="table-wrapper">
    <div class="table-container">
      <table id="calendar-table"></table>
    </div>
  </div>

  <div class="btn-area">
    <button id="btn-no-dup" class="main-btn btn-no-dup">被らないランダム</button>
    <button id="btn-allow-dup" class="main-btn btn-allow-dup">被れるランダム</button>
  </div>

  <div class="credit">
    <a href="https://x.com/momochou_md?s=20" target="_blank">for @momochou_md</a>
  </div>

  <div id="toast-notice"></div>

  <div id="modal-overlay" class="overlay">
    <div class="modal">
      <p id="modal-text"></p>
      <div id="modal-btns" class="modal-btns"></div>
    </div>
  </div>

<script>
  var monthDays = [31, 29, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
  var counts = [];
  var undoStack = [];
  var redoStack = [];
  var activeMonth = null;
  var activeDay = null;

  function init() {
    try {
      var saved = localStorage.getItem('bday_v_sweet_final');
      if (saved) { counts = JSON.parse(saved); } else { buildEmpty(); }
    } catch(e) { buildEmpty(); }
    render();
  }

  function buildEmpty() {
    counts = [];
    for (var m = 0; m < 12; m++) {
      var row = [];
      for (var d = 0; d < 31; d++) { row.push(d < monthDays[m] ? 0 : -1); }
      counts.push(row);
    }
  }

  /* 【修正1】iOS Safari リペイント強制 */
  function forceRepaint(el) {
    // offsetWidth 参照でリフロー・リペイントを強制発火
    void el.offsetWidth;
    // さらに requestAnimationFrame で次フレームも確実に更新
    requestAnimationFrame(function() {
      el.style.webkitTransform = 'translateZ(0)';
      requestAnimationFrame(function() {
        el.style.webkitTransform = '';
      });
    });
  }

  function render() {
    var table = document.getElementById('calendar-table');
    var html = '<tr><th></th>';
    for (var d = 0; d < 31; d++) {
      var cls = (activeDay === d) ? 'active-header' : '';
      html += '<th class="' + cls + '" onclick="toggleCol(' + d + ')">' + (d + 1) + '</th>';
    }
    html += '</tr>';

    for (var m = 0; m < 12; m++) {
      var rCls = (activeMonth === m) ? 'active-header' : '';
      html += '<tr><th class="' + rCls + '" onclick="toggleRow(' + m + ')">' + (m + 1) + '月</th>';
      for (var d = 0; d < 31; d++) {
        var val = counts[m][d];
        if (val === -1) {
          html += '<td class="cell none"></td>';
        } else {
          var cls = 'cell';
          if (val > 0) cls += ' color-' + (val > 5 ? 5 : val);
          if (activeMonth === m) cls += ' highlight-row';
          if (activeDay === d)   cls += ' highlight-col';
          if (activeMonth === m && activeDay === d) cls += ' cross-point';
          html += '<td class="' + cls + '" onclick="cellClick(' + m + ',' + d + ')">'
                + (val > 0 ? val : '') + '</td>';
        }
      }
      html += '</tr>';
    }

    table.innerHTML = html;

    /* 【修正1】innerHTML 更新後にリペイントを強制発火 */
    forceRepaint(table);

    document.getElementById('undo-btn').disabled = (undoStack.length === 0);
    document.getElementById('redo-btn').disabled = (redoStack.length === 0);
    try { localStorage.setItem('bday_v_sweet_final', JSON.stringify(counts)); } catch(e) {}
  }

  function showToast(m, d) {
    var toast = document.getElementById('toast-notice');
    toast.innerText = (m + 1) + '月' + (d + 1) + '日がえらばれたよ！';
    toast.style.display = 'none';
    void toast.offsetWidth;
    toast.style.display = 'block';
    if (window.navigator && window.navigator.vibrate) {
      window.navigator.vibrate([20, 10, 40]);
    }
  }

  window.toggleRow = function(m) { activeMonth = (activeMonth === m) ? null : m; render(); };
  window.toggleCol = function(d) { activeDay   = (activeDay   === d) ? null : d; render(); };

  window.cellClick = function(m, d, fromRandom) {
    undoStack.push({ type: 'normal', data: JSON.stringify(counts) });
    redoStack = [];
    counts[m][d]++;
    if (fromRandom) showToast(m, d);
    render();
  };

  window.undo = function() {
    if (!undoStack.length) return;
    var last = undoStack.pop();
    if (last.type !== 'reset') {
      redoStack.push({ type: 'normal', data: JSON.stringify(counts) });
    } else { redoStack = []; }
    counts = JSON.parse(last.data);
    render();
  };

  window.redo = function() {
    if (!redoStack.length) return;
    var next = redoStack.pop();
    undoStack.push({ type: 'normal', data: JSON.stringify(counts) });
    counts = JSON.parse(next.data);
    render();
  };

  document.getElementById('btn-no-dup').onclick = function() {
    var targets = [];
    for (var m = 0; m < 12; m++)
      for (var d = 0; d < 31; d++)
        if (counts[m][d] === 0) targets.push({m:m, d:d});
    if (!targets.length) {
      showModal('ぜんぶのマスが埋まったよ！<br>おめでとう〜！',
        [{label: 'やったー！', action: closeModal, css: 'ctrl-btn'}]);
      return;
    }
    var t = targets[Math.floor(Math.random() * targets.length)];
    cellClick(t.m, t.d, true);
  };

  document.getElementById('btn-allow-dup').onclick = function() {
    var allValid = [];
    for (var m = 0; m < 12; m++)
      for (var d = 0; d < 31; d++)
        if (counts[m][d] !== -1) allValid.push({m:m, d:d});
    var t = allValid[Math.floor(Math.random() * allValid.length)];
    cellClick(t.m, t.d, true);
  };

  document.getElementById('reset-trigger').onclick = function() {
    showModal('データをぜんぶ消しちゃう？<br>最初からやりなおす？', [
      {label: 'やめる',       action: closeModal,   css: 'ctrl-btn'},
      {label: '消しちゃう！', action: executeReset, css: 'reset-btn'}
    ]);
  };

  function executeReset() {
    undoStack.push({ type: 'reset', data: JSON.stringify(counts) });
    redoStack = [];
    for (var m = 0; m < 12; m++)
      for (var d = 0; d < 31; d++)
        if (counts[m][d] > 0) counts[m][d] = 0;
    render();
    closeModal();
  }

  function showModal(text, buttons) {
    document.getElementById('modal-text').innerHTML = text;
    var btnArea = document.getElementById('modal-btns');
    btnArea.innerHTML = '';
    buttons.forEach(function(b) {
      var btn = document.createElement('button');
      btn.innerText = b.label;
      btn.className = 'ctrl-btn ' + (b.css || '');
      btn.onclick = b.action;
      btnArea.appendChild(btn);
    });
    document.getElementById('modal-overlay').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
  }

  document.getElementById('undo-btn').onclick = undo;
  document.getElementById('redo-btn').onclick = redo;

  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible') {
      try {
        var saved = localStorage.getItem('bday_v_sweet_final');
        if (saved) counts = JSON.parse(saved);
        render();
      } catch(e) {}
    }
  });

  window.onload = init;
</script>
</body>
</html>
