<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>みんなのお誕生日</title>

<style>
:root{
  --main-pink:#ffb7c5;
  --sub-pink:#ff8fb1;
  --highlight-bg:#fff5f7;
  --highlight-border:#ffcada;
  --bg-color:#fffaf0;
  --text-color:#7d5a50;
  --mint-green:#b2e2d2;
}
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
body{
  margin:0;
  font-family:sans-serif;
  background:var(--bg-color);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
  gap:15px;
}
h1{color:var(--sub-pink);margin:0;}
.controls,.btn-area{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
button{
  padding:10px 16px;
  border-radius:12px;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
.reset-btn{background:#ff8a80;color:white;}
.btn-no-dup{background:var(--sub-pink);color:white;}
.btn-allow-dup{background:var(--mint-green);}
.table-container{
  background:white;
  padding:16px;
  border-radius:25px;
  border:6px solid #ffecb3;
}
table{border-collapse:separate;border-spacing:4px;}
th,.cell{
  width:34px;height:34px;
  text-align:center;
  border-radius:8px;
  font-size:13px;
}
th{cursor:pointer;}
.cell{
  background:white;
  border:2px solid #eee;
  cursor:pointer;
}
.cell.none{background:#f5f5f5;pointer-events:none;}
.color-1{background:#e1f5fe;}
.color-2{background:#f1f8e9;}
.color-3{background:#fff9c4;}
.color-4{background:#ffe0b2;}
.color-5{background:#f8bbd0;}
#toast{
  position:fixed;
  bottom:40px;
  background:var(--sub-pink);
  color:white;
  padding:10px 20px;
  border-radius:20px;
  display:none;
}
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.3);
  display:none;
  justify-content:center;
  align-items:center;
}
.modal{
  background:white;
  padding:30px;
  border-radius:20px;
  text-align:center;
}
</style>
</head>
<body>

<h1>みんなのお誕生日</h1>

<div class="controls">
  <button id="undo-btn">← もどす</button>
  <button id="redo-btn">すすむ →</button>
  <button id="reset-trigger" class="reset-btn">ぜんぶ消す！</button>
</div>

<div class="table-container">
  <table id="calendar-table"></table>
</div>

<div class="btn-area">
  <button id="btn-no-dup" class="btn-no-dup">被らないランダム</button>
  <button id="btn-allow-dup" class="btn-allow-dup">被れるランダム</button>
</div>

<div id="toast"></div>

<div id="modal-overlay" class="overlay">
  <div class="modal">
    <p id="modal-text"></p>
    <div id="modal-buttons"></div>
  </div>
</div>

<script>
var monthDays=[31,29,31,30,31,30,31,31,30,31,30,31];
var counts=[];
var undoStack=[];
var redoStack=[];

function buildEmpty(){
  counts=[];
  for(var m=0;m<12;m++){
    var row=[];
    for(var d=0;d<31;d++){
      row.push(d<monthDays[m]?0:-1);
    }
    counts.push(row);
  }
}

function init(){
  buildEmpty();
  render();
}

function render(){
  var table=document.getElementById("calendar-table");
  var html="<tr><th></th>";
  for(var d=0;d<31;d++){
    html+="<th>"+(d+1)+"</th>";
  }
  html+="</tr>";
  for(var m=0;m<12;m++){
    html+="<tr><th>"+(m+1)+"月</th>";
    for(var d=0;d<31;d++){
      var val=counts[m][d];
      if(val===-1){
        html+="<td class='cell none'></td>";
      }else{
        var cls="cell";
        if(val>0)cls+=" color-"+(val>5?5:val);
        html+="<td class='"+cls+"' data-m='"+m+"' data-d='"+d+"'>"+(val>0?val:"")+"</td>";
      }
    }
    html+="</tr>";
  }
  table.innerHTML=html;

  table.querySelectorAll(".cell:not(.none)").forEach(function(cell){
    cell.addEventListener("click",function(){
      var m=parseInt(this.dataset.m);
      var d=parseInt(this.dataset.d);
      undoStack.push(JSON.stringify(counts));
      redoStack=[];
      counts[m][d]++;
      render();
    });
  });

  void table.offsetHeight;
}

document.getElementById("undo-btn").onclick=function(){
  if(!undoStack.length)return;
  redoStack.push(JSON.stringify(counts));
  counts=JSON.parse(undoStack.pop());
  render();
};

document.getElementById("redo-btn").onclick=function(){
  if(!redoStack.length)return;
  undoStack.push(JSON.stringify(counts));
  counts=JSON.parse(redoStack.pop());
  render();
};

document.getElementById("btn-no-dup").onclick=function(){
  var targets=[];
  for(var m=0;m<12;m++)
    for(var d=0;d<31;d++)
      if(counts[m][d]===0)targets.push({m:m,d:d});
  if(!targets.length)return alert("全部埋まりました！");
  var t=targets[Math.floor(Math.random()*targets.length)];
  undoStack.push(JSON.stringify(counts));
  counts[t.m][t.d]++;
  render();
};

document.getElementById("btn-allow-dup").onclick=function(){
  var all=[];
  for(var m=0;m<12;m++)
    for(var d=0;d<31;d++)
      if(counts[m][d]!==-1)all.push({m:m,d:d});
  var t=all[Math.floor(Math.random()*all.length)];
  undoStack.push(JSON.stringify(counts));
  counts[t.m][t.d]++;
  render();
};

document.getElementById("reset-trigger").onclick=function(){
  if(confirm("全部消しますか？")){
    undoStack.push(JSON.stringify(counts));
    buildEmpty();
    render();
  }
};

window.onload=init;
</script>

</body>
</html>
